global:
  scrape_interval: 15s      # scrape every 15 seconds
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'chat-api'
    static_configs:
      - targets: ['host.docker.internal:3001']  # host.docker.internal = your Windows machine from Docker

  - job_name: 'ingestion-api'
    static_configs:
      - targets: ['host.docker.internal:8000']